name: "🐛 Bug Report / 反馈缺陷"
description: "Report a bug or incorrect agent step execution in VulnClaw"
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill out this form to help us diagnose the issue. / 请填写此表单帮助我们定位问题。
  - type: textarea
    id: description
    attributes:
      label: "Bug Description / 缺陷描述"
      description: "A clear description of what the issue is."
      placeholder: "e.g., Agent fails to load MCP tool chain under Windows..."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: "Reproduction Steps / 复现步骤"
      description: "How can we reproduce the error?"
      placeholder: |
        1. Set target to...
        2. Run agent scan...
        3. See error logs...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: "Logs / 运行日志"
      render: shell
